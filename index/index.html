    <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#ff9a9e,#fad0c4);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.carta{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    z-index:2;
}

h1{
    color:#ff4d6d;
}

.corazon{
    position:absolute;
    color:red;
    font-size:20px;
    animation:flotar 6s linear infinite;
}

@keyframes flotar{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="carta">
<h1>Para Ti 💖</h1>
<p>
Flaco eres el amor de mi vida hoy y siempre ❤️
</p>
</div>

<script>

function crearCorazon(){
    const corazon=document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML="❤️";

    corazon.style.left=Math.random()*100+"vw";
    corazon.style.animationDuration=(3+Math.random()*3)+"s";

    document.body.appendChild(corazon);

    setTimeout(()=>{
        corazon.remove();
    },6000);
}

setInterval(crearCorazon,300);

</script>

</body>
</html>
